<!doctype html><html lang="ko"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/><title>Deck</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--a:#22d3ee;--b:#7b2ff7}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:'Noto Sans KR','Sora',system-ui,sans-serif}
body{display:flex;background:#05060d;color:#e6edf3;overflow:hidden}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(40vw 40vw at 12% 8%,rgba(34,211,238,.18),transparent),radial-gradient(45vw 45vw at 90% 18%,rgba(123,47,247,.20),transparent),radial-gradient(50vw 50vw at 70% 95%,rgba(255,94,160,.16),transparent);animation:drift 18s ease-in-out infinite alternate}
@keyframes drift{to{transform:translateY(-4%) scale(1.05)}}
#prog{position:fixed;top:0;left:280px;right:0;height:3px;z-index:20;background:linear-gradient(90deg,#22d3ee,#7b2ff7,#ff5ea0);transform-origin:0;transform:scaleX(0)}
#side{width:280px;flex:0 0 280px;height:100vh;overflow-y:auto;background:rgba(8,11,22,.82);backdrop-filter:blur(14px);border-right:1px solid #1c2540;padding:22px 0;z-index:10}
#side h1{font-family:Sora;font-size:15px;font-weight:800;margin:0 20px 20px;line-height:1.4;background:linear-gradient(90deg,#22d3ee,#7b2ff7,#ff5ea0);-webkit-background-clip:text;background-clip:text;color:transparent}
#side a{display:flex;gap:11px;align-items:center;padding:9px 20px;color:#9fb0d0;text-decoration:none;font-size:13px;border-left:3px solid transparent;transition:.18s}
#side a:hover{background:#131a30;color:#fff}#side a.on{background:#131a30;color:#fff;border-left-color:#22d3ee}
#side a b{font-family:Sora;color:#445;min-width:22px}#side a.on b{color:#22d3ee}
#scroll{flex:1;height:100vh;overflow-y:auto;scroll-snap-type:y mandatory;scroll-behavior:smooth;z-index:1}
section{scroll-snap-align:center;height:100vh;display:flex;flex-direction:column;justify-content:center;padding:5vh 5vw;max-width:1320px;margin-inline:auto;overflow:hidden}
.t{font-family:Sora,'Noto Sans KR';font-size:clamp(24px,3.4vw,46px);font-weight:800;line-height:1.12;margin:0 0 20px;letter-spacing:-.5px;background:linear-gradient(120deg,var(--a),var(--b));-webkit-background-clip:text;background-clip:text;color:transparent}
.row{display:grid;grid-template-columns:1.05fr .95fr;gap:30px;align-items:center;flex:1;min-height:0}
.row.solo{grid-template-columns:1fr}
ul{margin:0;padding:22px 26px;list-style:none;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09);border-radius:18px;backdrop-filter:blur(8px);max-height:72vh;overflow:auto}
ul.cols{columns:2;column-gap:30px}
.row.solo ul.cols{columns:3}
li{position:relative;padding:9px 0 9px 26px;font-size:clamp(14px,1.4vw,19px);line-height:1.5;border-bottom:1px solid rgba(255,255,255,.06);break-inside:avoid}li:last-child{border:0}
li::before{content:"";position:absolute;left:0;top:16px;width:10px;height:10px;border-radius:3px;background:linear-gradient(135deg,var(--a),var(--b));box-shadow:0 0 12px var(--a)}
.shot{border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.1);box-shadow:0 24px 70px rgba(0,0,0,.55);display:flex;flex-direction:column;gap:8px;padding:8px;background:rgba(255,255,255,.05);max-height:74vh}
.shot img{width:100%;max-height:70vh;object-fit:contain;display:block;border-radius:12px}
.vid iframe{width:100%;aspect-ratio:16/9;border:0;border-radius:16px;box-shadow:0 24px 70px rgba(0,0,0,.55)}
.note{margin-top:14px;background:rgba(11,16,32,.7);border:1px solid #1c2540;border-radius:14px;padding:12px 18px;color:#aebbd6;font-size:13.5px;line-height:1.55;white-space:pre-wrap;backdrop-filter:blur(8px);max-height:18vh;overflow:auto}
.note b{display:block;font-family:Sora;font-size:12px;letter-spacing:.1em;color:#22d3ee;margin-bottom:7px}
.note.empty{display:none}.solo .shot{max-width:780px;margin:0 auto}
.html{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:24px 28px}
.html p{font-size:clamp(16px,1.7vw,22px);line-height:1.55;margin:.25em 0}
.gr{display:grid;gap:18px}.gr2{grid-template-columns:1fr 1fr}.gr3{grid-template-columns:repeat(3,1fr)}.gr4{grid-template-columns:repeat(4,1fr)}
.cd{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:18px 20px;backdrop-filter:blur(8px)}
.cd h3{margin:0 0 8px;font-family:Sora,'Noto Sans KR';font-size:clamp(15px,1.5vw,20px);font-weight:800}.cd p,.cd li{font-size:clamp(13px,1.25vw,16px);line-height:1.5;color:#cdd8ee;margin:.2em 0}
.ic{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:10px;background:linear-gradient(135deg,var(--a),var(--b));box-shadow:0 8px 24px rgba(34,211,238,.3)}
.flow{display:flex;align-items:stretch;gap:14px;flex-wrap:wrap}.flow .cd{flex:1;min-width:180px;position:relative}.flow .cd:not(:last-child)::after{content:"→";position:absolute;right:-13px;top:50%;transform:translateY(-50%);color:var(--a);font-size:22px;z-index:2}
.stat{font-family:Sora;font-size:clamp(30px,5vw,64px);font-weight:800;background:linear-gradient(120deg,var(--a),var(--b));-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1}
.pill{display:inline-block;padding:5px 13px;border-radius:999px;font-size:13px;font-weight:700;margin:3px;background:linear-gradient(135deg,var(--a),var(--b));color:#03121a}
.tag{display:inline-block;padding:3px 9px;border-radius:7px;font-size:11px;font-weight:700;background:rgba(34,211,238,.16);color:#22d3ee;margin-left:6px}
.html .lead{font-size:clamp(16px,1.7vw,21px);color:#aebbd6;margin-bottom:18px}
section.divider{min-height:92vh;align-items:center}
.dvr{text-align:center}.dvr span{font-family:Sora;letter-spacing:.35em;font-size:14px;color:#7f8db0}
.dvr h2{font-family:Sora,'Noto Sans KR';font-size:clamp(40px,7vw,90px);font-weight:800;margin:.2em 0 0;background:linear-gradient(120deg,var(--a),var(--b));-webkit-background-clip:text;background-clip:text;color:transparent}
@media(max-width:860px){.row{grid-template-columns:1fr}#side{width:62px;flex-basis:62px}#side h1,#side a span{display:none}#prog{left:62px}}
</style></head><body>
<div id="bg"></div><div id="prog"></div>
<nav id="side"><h1 id="dt"></h1><div id="toc"></div></nav>
<main id="scroll"></main>
<script>
const D={"title": "Microsoft Foundry를 활용한 Agentic AI", "cards": [{"n": 1, "title": "Microsoft Foundry를 활용한 Agentic AI", "divider": true, "points": [], "note": "안녕하세요. 오늘은 Microsoft Foundry를 활용한 Agentic AI에 대해 발표하겠습니다. 발표자는 Solution Engineer Kichul Kim입니다.", "imgs": [], "videos": []}, {"n": 2, "title": "1. Microsoft Foundry, 무엇일까요?", "divider": true, "points": [], "note": "먼저 Microsoft Foundry가 무엇인지부터 살펴보겠습니다.", "imgs": [], "videos": []}, {"n": 3, "title": "The AI app & agent factory", "html": "<p class='lead'>모델·도구·데이터를 넣으면 AI 앱과 에이전트가 나오는 공장.</p><svg viewBox='0 0 760 200' style='width:100%;max-height:46vh'><defs><linearGradient id='g1' x1='0' x2='1'><stop offset='0' stop-color='#22d3ee'/><stop offset='1' stop-color='#7b2ff7'/></linearGradient></defs><rect x='280' y='55' width='200' height='90' rx='16' fill='url(#g1)'/><text x='380' y='95' fill='#fff' font-size='18' font-weight='700' text-anchor='middle'>Foundry</text><text x='380' y='120' fill='#eaf' font-size='12' text-anchor='middle'>factory</text><g fill='#cdd8ee' font-size='13' text-anchor='middle'><text x='90' y='70'>Models</text><text x='90' y='105'>Tools</text><text x='90' y='140'>Data</text></g><g stroke='#22d3ee' stroke-width='2' fill='none'><path d='M150 70H280M150 105H280M150 140H280'/></g><path d='M480 100H640' stroke='#7b2ff7' stroke-width='2'/><rect x='640' y='75' width='100' height='50' rx='12' fill='rgba(255,255,255,.06)' stroke='#7b2ff7'/><text x='690' y='105' fill='#fff' font-size='13' text-anchor='middle'>App·Agent</text></svg>", "points": [], "note": "Foundry의 핵심 비전은 'AI 앱과 에이전트를 찍어내는 공장'입니다. 누구나 빠르게 만들고 배포할 수 있게 돕습니다.", "imgs": [], "videos": []}, {"n": 4, "title": "Build agents, your way", "html": "<p class='lead'>통합·사용 편의성·개발 속도는 위로, 제어·가시성·커스터마이징은 아래로. 원하는 방식대로 에이전트를 만듭니다.</p><div class='gr gr3'><div class='cd' style='--a:#3bb78f;--b:#22d3ee'><div class='ic'>☁️</div><h3>IaaS</h3><p>Infrastructure-as-a-service · GPUs & Containers</p><span class='tag'>BYO frameworks</span></div><div class='cd' style='--a:#22d3ee;--b:#7b2ff7'><div class='ic'>⚙️</div><h3>PaaS</h3><p>Foundry Agent Service · 관리형 서비스로 코드 작성</p></div><div class='cd' style='--a:#7b2ff7;--b:#ff5ea0'><div class='ic'>▶️</div><h3>SaaS</h3><p>Copilot Studio · 드래그&드롭 즉시 런타임</p></div></div>", "points": [], "note": "에이전트를 만드는 방식은 세 가지입니다. 인프라부터 직접 다루는 IaaS, 관리형 PaaS, 그리고 노코드 SaaS인 Copilot Studio까지 선택할 수 있습니다.", "imgs": [], "videos": []}, {"n": 5, "title": "AI Development Fundamentals", "html": "<p class='lead'>Foundry 허브를 6개 기본 요소가 둘러싼 라이프사이클.</p><svg viewBox='0 0 700 360' style='width:100%;max-height:52vh'><defs><linearGradient id='h' x1='0' x2='1'><stop offset='0' stop-color='#22d3ee'/><stop offset='1' stop-color='#7b2ff7'/></linearGradient></defs><circle cx='350' cy='180' r='66' fill='url(#h)'/><text x='350' y='178' fill='#fff' font-size='15' font-weight='800' text-anchor='middle'>Microsoft</text><text x='350' y='198' fill='#fff' font-size='15' font-weight='800' text-anchor='middle'>Foundry</text><g font-size='13' fill='#dbe6ff' text-anchor='middle'><text x='350' y='40'>🧩 Models</text><text x='600' y='130'>🧠 Knowledge</text><text x='600' y='250'>🛠️ Orchestration</text><text x='350' y='340'>👁️ Observability</text><text x='105' y='250'>🎚️ Fine-tuning</text><text x='105' y='130'>🚀 Deployment</text></g><g stroke='#3854' stroke-width='1.5' fill='none' opacity='.5'><circle cx='350' cy='180' r='130'/></g></svg>", "points": [], "note": "AI 개발의 기본기는 모델, 지식·도구, 오케스트레이션, 관측, 미세조정, 배포의 6가지입니다. Foundry가 이 전체를 묶어줍니다.", "imgs": [], "videos": []}, {"n": 6, "title": "Build → Optimize → Operate", "html": "<div class='flow'><div class='cd' style='--a:#22d3ee;--b:#7b2ff7'><div class='ic'>🔧</div><h3>Build</h3><p>식별·리서치·테스트·빌드·도구추가·미세조정·오케스트레이션</p></div><div class='cd' style='--a:#7b2ff7;--b:#ff5ea0'><div class='ic'>⚡</div><h3>Optimize</h3><p>커스터마이징·호스팅·평가·배포</p></div><div class='cd' style='--a:#ff5ea0;--b:#ff8a00'><div class='ic'>📈</div><h3>Operate</h3><p>모니터링·위험완화·앱 통합</p></div></div><p class='lead' style='text-align:center;margin-top:16px'>↻ '잘 동작하나요?' 체크로 반복</p>", "points": [], "note": "개발 사이클은 Build, Optimize, Operate 세 단계로 반복됩니다. 잘 동작하지 않으면 다시 빌드 단계로 돌아갑니다.", "imgs": [], "videos": []}, {"n": 7, "title": "2. Foundry가 제공하는 서비스들", "divider": true, "points": [], "note": "이제 Foundry가 실제로 제공하는 서비스들을 살펴봅니다.", "imgs": [], "videos": []}, {"n": 8, "title": "Every model. Every use case. One platform.", "html": "<p class='lead'>11,000+ 모델, 하나의 플랫폼.</p><div class='flow'><div class='cd'><div class='ic'>🧩</div><h3>11,000+ 모델</h3><p>OpenAI·Llama·Mistral·DeepSeek·Cohere·Phi</p></div><div class='cd' style='--a:#3bb78f;--b:#22d3ee'><div class='ic'>🏢</div><h3>MS 직접 판매</h3><p>SLA·Reserved capacity·PTU·가드레일</p></div><div class='cd' style='--a:#7b2ff7;--b:#ff5ea0'><div class='ic'>✅</div><h3>Enterprise-Ready</h3><p>통합 접근·확장 배포</p></div></div>", "points": [], "note": "이 장표는 11,000개 넘는 모델 로고가 한 화면을 채운 카탈로그입니다. Azure OpenAI·Llama·Mistral·DeepSeek 등 모든 프론티어·오픈 모델을 하나의 플랫폼에서 쓰며, 일부는 MS가 직접 SLA·보안을 보장합니다.", "imgs": [], "videos": []}, {"n": 9, "title": "모델 라우터", "html": "<div class='gr gr2' style='align-items:center'><svg viewBox='0 0 200 200' style='width:100%;max-height:40vh'><circle cx='100' cy='100' r='80' fill='none' stroke='#1c2540' stroke-width='22'/><circle cx='100' cy='100' r='80' fill='none' stroke='url(#h)' stroke-width='22' stroke-dasharray='301 502' stroke-linecap='round' transform='rotate(-90 100 100)'/><text x='100' y='95' fill='#fff' font-size='40' font-weight='800' text-anchor='middle'>60%</text><text x='100' y='120' fill='#9fb0d0' font-size='13' text-anchor='middle'>비용 절감</text></svg><div class='cd'><h3>모델 라우터</h3><p>작업 복잡도로 최적 모델 자동 선택, 라우팅 프로필·하위집합 정의, Azure 신뢰성, Agent Service 내장. GPT-4.1 단독 대비 비슷한 정확도.</p></div></div>", "points": [], "note": "네 개 기둥 아래 화살표가 모이고 큰 60% 숫자가 강조된 장표입니다. 작업 복잡도에 따라 모델을 자동 선택해 GPT-4.1 단독 대비 비슷한 정확도로 최대 60% 비용을 절감합니다.", "imgs": [], "videos": []}, {"n": 10, "title": "모델 라우터 동작 구조", "html": "<svg viewBox='0 0 760 240' style='width:100%;max-height:50vh'><defs><linearGradient id='h' x1='0' x2='1'><stop offset='0' stop-color='#22d3ee'/><stop offset='1' stop-color='#7b2ff7'/></linearGradient></defs><rect x='30' y='95' width='140' height='50' rx='12' fill='rgba(255,255,255,.06)' stroke='#22d3ee'/><text x='100' y='125' fill='#fff' font-size='13' text-anchor='middle'>API 호출</text><rect x='300' y='90' width='160' height='60' rx='14' fill='url(#h)'/><text x='380' y='118' fill='#fff' font-size='14' font-weight='700' text-anchor='middle'>Router</text><text x='380' y='138' fill='#eaf' font-size='11' text-anchor='middle'>평가·분기</text><path d='M170 120H300' stroke='#22d3ee' stroke-width='2'/><g stroke='#7b2ff7' stroke-width='2' fill='none'><path d='M460 110 L600 60M460 130 L600 130M460 150 L600 200'/></g><g fill='rgba(255,255,255,.06)' stroke='#7b2ff7'><rect x='600' y='40' width='130' height='40' rx='10'/><rect x='600' y='110' width='130' height='40' rx='10'/><rect x='600' y='180' width='130' height='40' rx='10'/></g><g fill='#dbe6ff' font-size='12' text-anchor='middle'><text x='665' y='65'>nano</text><text x='665' y='135'>mini</text><text x='665' y='205'>full</text></g></svg><p class='lead'>간단→작은 모델, 복잡→큰 모델로 자동 라우팅.</p>", "points": [], "note": "라우터는 입력을 평가해 간단한 질문은 작은 모델로, 복잡한 질문은 큰 모델로 보냅니다.", "imgs": [], "videos": []}, {"n": 11, "title": "Agent Orchestration", "html": "<div class='gr gr2' style='align-items:center'><div class='gr' style='gap:10px'><div class='cd'><h3>① 모델 선택</h3></div><div class='cd'><h3>② 프롬프트</h3></div><div class='cd'><h3>③ 도구·지식</h3></div><div class='cd'><h3>④ 메모리·가드레일</h3></div></div><svg viewBox='0 0 200 200' style='width:100%;max-height:42vh'><defs><linearGradient id='h' x1='0' x2='1'><stop offset='0' stop-color='#22d3ee'/><stop offset='1' stop-color='#7b2ff7'/></linearGradient></defs><circle cx='100' cy='100' r='70' fill='url(#h)' opacity='.25'/><circle cx='100' cy='100' r='44' fill='url(#h)'/><text x='100' y='98' fill='#fff' font-size='13' font-weight='700' text-anchor='middle'>Agent</text><text x='100' y='116' fill='#fff' font-size='11' text-anchor='middle'>Playground</text></svg></div>", "points": [], "note": "왼쪽 설정 패널에 모델·프롬프트·도구·지식·메모리·가드레일, 오른쪽엔 채팅 테스트 창이 있는 화면입니다. 멀티 에이전트 워크플로우를 구성하고 Playground에서 바로 검증합니다.", "imgs": [], "videos": []}, {"n": 12, "title": "Hosted Agent", "html": "<div class='flow'><div class='cd'><div class='ic'>💻</div><h3>Client</h3><p>Agent frameworks</p></div><div class='cd'><div class='ic'>📦</div><h3>Container</h3><p>Build→Package→Deploy</p></div><div class='cd' style='--a:#7b2ff7;--b:#ff5ea0'><div class='ic'>🚀</div><h3>Agent Service</h3><p>hosted · Running</p></div></div>", "points": [], "note": "내가 만든 코드 에이전트를 컨테이너로 묶어 Foundry Agent Service에 호스팅합니다.", "imgs": [], "videos": []}, {"n": 13, "title": "One-click publishing", "html": "<div class='flow'><div class='cd'><div class='ic'>🛠️</div><h3>Foundry</h3><p>에이전트 빌드</p></div><div class='cd' style='--a:#7b2ff7;--b:#ff5ea0'><div class='ic'>📣</div><h3>M365 · Teams</h3><p>원클릭 Publish</p></div></div><p class='lead' style='text-align:center;margin-top:14px'>한 번 게시 → 즉시 사용</p>", "points": [], "note": "원클릭 게시로 에이전트를 M365 Copilot과 Teams에 즉시 배포할 수 있습니다.", "imgs": [], "videos": []}, {"n": 14, "title": "엣지 라우터에서 CTL11 LED는 무엇을 하나요?", "divider": true, "points": [], "note": "현장 시나리오를 예로 들어봅니다. 엣지 라우터의 CTL11 LED 질문입니다.", "imgs": [], "videos": []}, {"n": 15, "title": "현장 질의 — 멀티소스 지식이 필요한 순간", "html": "<p class='lead'>\"P4324 장비가 멈추고 CTL11 경고등이 빨간불, UL 817 라벨이 보이는데 부품 교체 가능할까요?\"</p><div class='gr gr2'><div class='cd'><h3>장비 매뉴얼</h3><p>Fabric OneLake에 통합</p></div><div class='cd'><h3>전기 표준</h3><p>웹에서 확인 가능</p></div><div class='cd'><h3>사내 정책·문서</h3><p>SharePoint 관리</p></div><div class='cd'><h3>사용자 오타</h3><p>의도 해석 필요</p></div></div>", "points": [], "note": "이런 질문은 매뉴얼, 웹 표준, 사내 문서, 사용자 의도까지 여러 소스를 동시에 봐야 답할 수 있습니다.", "imgs": [], "videos": []}, {"n": 16, "title": "Multi-Source AI Knowledge Bases", "html": "<svg viewBox='0 0 720 240' style='width:100%;max-height:50vh'><defs><linearGradient id='h2' x1='0' x2='1'><stop offset='0' stop-color='#22d3ee'/><stop offset='1' stop-color='#7b2ff7'/></linearGradient></defs><g stroke='#3a4d80' stroke-width='2' fill='none'><path d='M200 60H520M200 120H520M200 180H520'/></g><g fill='rgba(255,255,255,.06)' stroke='#22d3ee'><rect x='40' y='100' width='150' height='40' rx='10'/></g><text x='115' y='125' fill='#fff' font-size='13' text-anchor='middle'>Query planning</text><g font-size='13' fill='#dbe6ff' text-anchor='middle'><text x='360' y='52'>CRM</text><text x='360' y='112'>SharePoint</text><text x='360' y='172'>Web</text></g><rect x='520' y='90' width='150' height='60' rx='14' fill='url(#h2)'/><text x='595' y='118' fill='#fff' font-size='14' font-weight='700' text-anchor='middle'>SLM→IQ</text><text x='595' y='138' fill='#eaf' font-size='11' text-anchor='middle'>통합 응답</text></svg><p class='lead'>여러 지식 소스를 한 답으로 묶는 Foundry IQ.</p>", "points": [], "note": "Foundry IQ는 CRM, SharePoint, 웹 등 여러 지식 소스를 묶어 하나의 답으로 만들어줍니다.", "imgs": [], "videos": []}, {"n": 17, "title": "MCP-enabled tools in Microsoft Foundry", "html": "<p class='lead'>1,404개 도구를 순차 연결.</p><div class='gr gr3'><div class='cd'><div class='ic'>⚙️</div><h3>Configured</h3></div><div class='cd' style='--a:#7b2ff7;--b:#ff5ea0'><div class='ic'>📚</div><h3>Catalog</h3></div><div class='cd' style='--a:#3bb78f;--b:#22d3ee'><div class='ic'>🧪</div><h3>Custom</h3></div></div><div style='margin-top:14px'><span class='pill'>Cosmos DB</span><span class='pill'>GitHub</span><span class='pill'>Hugging Face</span><span class='pill'>SQL</span><span class='pill'>Elastic</span></div>", "points": [], "note": "1,404개 도구 목록과 Configured/Catalog/Custom 3분류 칩이 보입니다. 에이전트가 MCP 도구를 순차로 연결해 작업을 수행합니다.", "imgs": [], "videos": []}, {"n": 18, "title": "Fine-tuning", "html": "<div class='gr gr3'><div class='cd'><div class='ic'>🎯</div><h3>정확도↑</h3><p>유즈케이스 최적화</p></div><div class='cd' style='--a:#7b2ff7;--b:#ff5ea0'><div class='ic'>💰</div><h3>비용·지연↓</h3></div><div class='cd' style='--a:#3bb78f;--b:#22d3ee'><div class='ic'>🛡️</div><h3>환각 방지</h3></div></div>", "points": [], "note": "파인튜닝으로 특정 업무에 맞춘 정확도를 높이고, 비용과 지연을 줄이며 환각을 방지합니다.", "imgs": [], "videos": []}, {"n": 19, "title": "Foundry Control Plane", "html": "<div class='gr gr3'><div class='cd'><div class='ic'>📊</div><h3>운영 가시성</h3><p>토큰·지연·평가</p></div><div class='cd' style='--a:#ff5ea0;--b:#7b2ff7'><div class='ic'>🔒</div><h3>보안</h3><p>Red team·유출방지</p></div><div class='cd' style='--a:#3bb78f;--b:#22d3ee'><div class='ic'>🏢</div><h3>전사 운영</h3><p>스케줄·에러율</p></div></div>", "points": [], "note": "Control Plane은 토큰 사용량, 보안, 평가 지표를 전사적으로 모니터링해 운영을 통제합니다.", "imgs": [], "videos": []}, {"n": 20, "title": "Evaluators", "html": "<div class='gr gr3'><div class='cd'><h3>Quality</h3><p>Document Retrieval · Groundedness · Relevance · Coherence · Fluency · NLP Metrics</p></div><div class='cd' style='--a:#ff5ea0;--b:#7b2ff7'><h3>Risk & Safety</h3><p>Jailbreaks · Hate · Violence · Self-Harm · Code Vulnerability · Data Leakage</p></div><div class='cd' style='--a:#3bb78f;--b:#22d3ee'><h3>Agents</h3><p>Intent Resolution · Tool Accuracy · Task Adherence · Completion <span class='tag'>NEW</span></p></div></div><p class='lead' style='text-align:center;margin-top:16px'>+ Custom Evaluators</p>", "points": [], "note": "Quality·Risk&Safety·Agents 세 컬럼에 평가 항목이 가득하고 NEW 배지가 붙어 있습니다. 커스텀 평가기까지 더해 품질·안전·동작을 정량 측정합니다.", "imgs": [], "videos": []}, {"n": 21, "title": "Agent 평가 예시 — 일기예보 제공", "html": "<svg viewBox='0 0 760 150' style='width:100%;max-height:34vh'><defs><linearGradient id='h' x1='0' x2='1'><stop offset='0' stop-color='#22d3ee'/><stop offset='1' stop-color='#7b2ff7'/></linearGradient></defs><g fill='rgba(255,255,255,.06)' stroke='#22d3ee'><rect x='20' y='50' width='200' height='50' rx='12'/></g><rect x='290' y='45' width='180' height='60' rx='14' fill='url(#h)'/><rect x='540' y='50' width='200' height='50' rx='12' fill='rgba(255,255,255,.06)' stroke='#7b2ff7'/><g fill='#fff' font-size='13' text-anchor='middle'><text x='120' y='80'>① Intent</text><text x='380' y='80'>② 도구 호출</text><text x='640' y='80'>③ 응답</text></g><g stroke='#7b2ff7' stroke-width='2'><path d='M220 75H290M470 75H540'/></g></svg><p class='lead'>의도→도구→응답 각 단계 정량 평가.</p>", "points": [], "note": "예: 날씨 질문에 대해 의도 해석 → 도구 호출 → 응답 각 단계를 정밀하게 평가합니다.", "imgs": [], "videos": []}, {"n": 22, "title": "Model Customization Options", "html": "<p class='lead'>적응 성숙도가 오를수록 비즈니스 가치도 상승.</p><svg viewBox='0 0 720 300' style='width:100%;max-height:52vh'><g><line x1='60' y1='270' x2='700' y2='270' stroke='#3a4d80'/><line x1='60' y1='20' x2='60' y2='270' stroke='#3a4d80'/></g><g fill='url(#h)'><rect x='70' y='260' width='80' height='8' rx='8'/><text x='110' y='285' fill='#9fb0d0' font-size='11' text-anchor='middle'>Base</text><rect x='170' y='222' width='80' height='46' rx='8'/><text x='210' y='285' fill='#9fb0d0' font-size='11' text-anchor='middle'>Prompt</text><rect x='270' y='184' width='80' height='84' rx='8'/><text x='310' y='285' fill='#9fb0d0' font-size='11' text-anchor='middle'>RAG</text><rect x='370' y='146' width='80' height='122' rx='8'/><text x='410' y='285' fill='#9fb0d0' font-size='11' text-anchor='middle'>Signals</text><rect x='470' y='108' width='80' height='160' rx='8'/><text x='510' y='285' fill='#9fb0d0' font-size='11' text-anchor='middle'>Tune</text><rect x='570' y='70' width='80' height='198' rx='8'/><text x='610' y='285' fill='#9fb0d0' font-size='11' text-anchor='middle'>Loop</text></svg>", "points": [], "note": "기본 모델부터 프롬프트, RAG, 피드백, 파인튜닝, 지속 개선까지 6단계로 모델을 고도화합니다.", "imgs": [], "videos": []}, {"n": 23, "title": "감사합니다", "divider": true, "points": [], "note": "이상으로 발표를 마칩니다. 감사합니다.", "imgs": [], "videos": []}, {"n": 24, "title": "최신 업데이트", "html": "<div class=\"s\" style=\"left:6%;top:18%;width:88%;height:64%;\"><p style=\"font-size:6cqh;\">🆕 최신 업데이트</p><p style=\"font-size:3cqh;\">출처: https://raw.githubusercontent.com/MicrosoftDocs/azure-ai-docs/main/articles/foundry/whats-new-foundry.md</p><p style=\"font-size:2.6cqh;\">수집일 2026-06-29</p></div>",
