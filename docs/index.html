<!doctype html><html lang="ko"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/><title>Deck</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--a:#22d3ee;--b:#7b2ff7}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:'Noto Sans KR','Sora',system-ui,sans-serif}
body{display:flex;background:#05060d;color:#e6edf3;overflow:hidden}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(40vw 40vw at 12% 8%,rgba(34,211,238,.18),transparent),radial-gradient(45vw 45vw at 90% 18%,rgba(123,47,247,.20),transparent),radial-gradient(50vw 50vw at 70% 95%,rgba(255,94,160,.16),transparent);animation:drift 18s ease-in-out infinite alternate}
#bg::after{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:54px 54px;mask:radial-gradient(80% 60% at 60% 40%,#000,transparent)}
@keyframes drift{to{transform:translateY(-4%) scale(1.05)}}
#prog{position:fixed;top:0;left:280px;right:0;height:3px;z-index:20;background:linear-gradient(90deg,#22d3ee,#7b2ff7,#ff5ea0);transform-origin:0;transform:scaleX(0)}
#side{width:280px;flex:0 0 280px;height:100vh;overflow-y:auto;background:rgba(8,11,22,.82);backdrop-filter:blur(14px);border-right:1px solid #1c2540;padding:22px 0;z-index:10}
#side h1{font-family:Sora;font-size:15px;font-weight:800;margin:0 20px 20px;line-height:1.4;background:linear-gradient(90deg,#22d3ee,#7b2ff7,#ff5ea0);-webkit-background-clip:text;background-clip:text;color:transparent}
#side a{display:flex;gap:11px;align-items:center;padding:9px 20px;color:#9fb0d0;text-decoration:none;font-size:13px;border-left:3px solid transparent;transition:.18s}
#side a:hover{background:#131a30;color:#fff}#side a.on{background:#131a30;color:#fff;border-left-color:#22d3ee}
#side a b{font-family:Sora;color:#445;min-width:22px}#side a.on b{color:#22d3ee}
#scroll{flex:1;height:100vh;overflow-y:auto;scroll-snap-type:y proximity;scroll-behavior:smooth;z-index:1}
section{scroll-snap-align:start;min-height:62vh;display:flex;flex-direction:column;justify-content:center;padding:9vh 5vw;max-width:1320px;margin-inline:auto;overflow:visible;border-bottom:1px solid rgba(255,255,255,.05)}
section:last-of-type{border-bottom:0}
.t{position:relative;font-family:Sora,'Noto Sans KR';font-size:clamp(24px,3.2vw,44px);font-weight:800;line-height:1.12;margin:0 0 26px;padding-bottom:14px;letter-spacing:-.5px;background:linear-gradient(120deg,var(--a),var(--b));-webkit-background-clip:text;background-clip:text;color:transparent}
.t::before{content:"";position:absolute;left:0;bottom:0;width:72px;height:4px;border-radius:4px;background:linear-gradient(90deg,var(--a),var(--b));box-shadow:0 0 18px var(--a)}
.kick{display:inline-flex;align-items:center;gap:8px;font-family:Sora;font-size:12px;letter-spacing:.22em;color:#7f8db0;margin:0 0 12px;text-transform:uppercase}
.kick i{width:24px;height:2px;background:linear-gradient(90deg,var(--a),var(--b));display:inline-block;border-radius:2px}
.row{display:grid;grid-template-columns:1.05fr .95fr;gap:30px;align-items:center}
.row.solo{grid-template-columns:1fr}
ul{margin:0;padding:22px 26px;list-style:none;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09);border-radius:18px;backdrop-filter:blur(8px)}
ul.cols{columns:2;column-gap:30px}
.row.solo ul.cols{columns:3}
li{position:relative;padding:9px 0 9px 26px;font-size:clamp(14px,1.4vw,19px);line-height:1.5;border-bottom:1px solid rgba(255,255,255,.06);break-inside:avoid}li:last-child{border:0}
li::before{content:"";position:absolute;left:0;top:16px;width:10px;height:10px;border-radius:3px;background:linear-gradient(135deg,var(--a),var(--b));box-shadow:0 0 12px var(--a)}
.shot{border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.1);box-shadow:0 24px 70px rgba(0,0,0,.55);display:flex;flex-direction:column;gap:8px;padding:8px;background:rgba(255,255,255,.05);max-height:74vh}
.shot img{width:100%;max-height:70vh;object-fit:contain;display:block;border-radius:12px}
.vid iframe{width:100%;aspect-ratio:16/9;border:0;border-radius:16px;box-shadow:0 24px 70px rgba(0,0,0,.55)}
.note{margin-top:14px;background:rgba(11,16,32,.7);border:1px solid #1c2540;border-radius:14px;padding:12px 18px;color:#aebbd6;font-size:13.5px;line-height:1.55;white-space:pre-wrap;backdrop-filter:blur(8px)}
.note b{display:block;font-family:Sora;font-size:12px;letter-spacing:.1em;color:#22d3ee;margin-bottom:7px}
.note.empty{display:none}.solo .shot{max-width:780px;margin:0 auto}
.html{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:30px 34px;box-shadow:0 30px 80px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.06)}
.html p{font-size:clamp(16px,1.7vw,22px);line-height:1.55;margin:.25em 0}
.gr{display:grid;gap:18px}.gr2{grid-template-columns:1fr 1fr}.gr3{grid-template-columns:repeat(3,1fr)}.gr4{grid-template-columns:repeat(4,1fr)}
.cd{position:relative;background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:22px 22px;backdrop-filter:blur(8px);overflow:hidden;transition:transform .25s,box-shadow .25s,border-color .25s}
.cd::before{content:"";position:absolute;left:0;top:0;height:3px;width:100%;background:linear-gradient(90deg,var(--a),var(--b));opacity:.85}
.cd:hover{transform:translateY(-4px);border-color:rgba(255,255,255,.22);box-shadow:0 22px 50px rgba(0,0,0,.45)}
.cd h3{margin:0 0 8px;font-family:Sora,'Noto Sans KR';font-size:clamp(15px,1.5vw,20px);font-weight:800}.cd p,.cd li{font-size:clamp(13px,1.25vw,16px);line-height:1.5;color:#cdd8ee;margin:.2em 0}
.ic{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:12px;background:linear-gradient(135deg,var(--a),var(--b));box-shadow:0 10px 26px rgba(34,211,238,.32);border:1px solid rgba(255,255,255,.18)}
.flow{display:flex;align-items:stretch;gap:22px;flex-wrap:wrap}.flow .cd{flex:1;min-width:180px;position:relative}.flow .cd:not(:last-child)::after{content:"→";position:absolute;right:-17px;top:50%;transform:translateY(-50%);color:var(--a);font-size:24px;z-index:2;text-shadow:0 0 12px var(--a)}
.stat{font-family:Sora;font-size:clamp(30px,5vw,64px);font-weight:800;background:linear-gradient(120deg,var(--a),var(--b));-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1}
.pill{display:inline-block;padding:5px 13px;border-radius:999px;font-size:13px;font-weight:700;margin:3px;background:linear-gradient(135deg,var(--a),var(--b));color:#03121a}
.tag{display:inline-block;padding:3px 9px;border-radius:7px;font-size:11px;font-weight:700;background:rgba(34,211,238,.16);color:#22d3ee;margin-left:6px}
.html .lead{font-size:clamp(16px,1.7vw,21px);color:#aebbd6;margin-bottom:18px}
section.divider{min-height:80vh;align-items:center}
.dvr{text-align:center}.dvr span{font-family:Sora;letter-spacing:.35em;font-size:14px;color:#7f8db0}
.dvr h2{font-family:Sora,'Noto Sans KR';font-size:clamp(40px,7vw,90px);font-weight:800;margin:.2em 0 0;background:linear-gradient(120deg,var(--a),var(--b));-webkit-background-clip:text;background-clip:text;color:transparent}
.t,.html,.row,.dvr{opacity:0;transform:translateY(18px);transition:opacity .6s ease,transform .6s ease}
section.in .t,section.in .html,section.in .row,section.in .dvr{opacity:1;transform:none}
section.in .t{transition-delay:.05s}section.in .html,section.in .row{transition-delay:.14s}
.mer{margin:6px auto 0;max-width:920px;text-align:center}.mer svg{max-width:100%;height:auto;filter:drop-shadow(0 14px 40px rgba(0,0,0,.45))}
@media(max-width:860px){.row{grid-template-columns:1fr}#side{width:62px;flex-basis:62px}#side h1,#side a span{display:none}#prog{left:62px}}
</style></head><body>
<div id="bg"></div><div id="prog"></div>
<nav id="side"><h1 id="dt"></h1><div id="toc"></div></nav>
<main id="scroll"></main>
<script>
const D={"title": "Microsoft Foundry를 활용한 Agentic AI", "cards": [{"n": 1, "title": "Microsoft Foundry를 활용한 Agentic AI", "divider": true, "points": [], "note": "Microsoft Foundry를 활용한 Agentic AI 발표를 시작하겠습니다. 발표자는 Solution Engineer 김기철입니다. 오늘은 모델 선택부터 에이전트 빌드·평가·배포·운영까지, Foundry 하나로 끝나는 엔드투엔드 흐름을 보여드립니다.", "imgs": [], "videos": []}, {"n": 2, "title": "1. Microsoft Foundry, 무엇일까요?", "divider": true, "points": [], "note": "첫 번째 파트입니다. Microsoft Foundry가 정확히 무엇이고 왜 필요한지부터 풀어가겠습니다. AI 앱과 에이전트를 만드는 통합 플랫폼이라는 큰 그림을 먼저 잡고 들어갑니다.", "imgs": [], "videos": []}, {"n": 3, "title": "The AI app & agent factory", "html": "<p class='lead'>모델·도구·데이터를 넣으면 AI 앱과 에이전트가 나오는 공장.</p><div class='gr gr4'><div class='cd'><div class='ic'>🧩</div><h3>Models</h3><p>1,000+ 프런티어·오픈 모델</p></div><div class='cd'><div class='ic'>🔧</div><h3>Tools</h3><p>MCP·내장 도구 1,400+</p></div><div class='cd'><div class='ic'>📚</div><h3>Data</h3><p>CRM·SharePoint·웹 지식</p></div><div class='cd' style='--a:#a6ed5d;--b:#22d3ee'><div class='ic'>🚀</div><h3>App·Agent</h3><p>한 번에 빌드·배포</p></div></div>", "points": [], "note": "Foundry의 핵심 비전은 'AI 앱과 에이전트를 찍어내는 공장'입니다. 왼쪽에서 모델·도구·데이터를 넣으면 오른쪽에서 동작하는 앱과 에이전트가 나옵니다. 1,000개 이상 모델, 1,400개 이상 도구, 기업 데이터 연결을 한곳에서 제공합니다. 덕분에 누구나 빠르게 만들고 즉시 배포할 수 있습니다.", "imgs": [], "videos": []}, {"n": 4, "title": "Build agents, your way", "html": "<p class='lead'>플랫폼 통합·사용 편의·개발 속도. 통제·가시성·커스터마이징.</p><div class='flow'><div class='cd'><div class='ic'>☁️</div><h3>IaaS</h3><p>Infrastructure-as-a-service. 모든 디테일을 직접 제어하는 코드. GPU·컨테이너, 프레임워크 자유.</p></div><div class='cd'><div class='ic'>⚙️</div><h3>PaaS</h3><p>Platform-as-a-service. 관리형 서비스 코드. Microsoft Foundry Agent Service.</p></div><div class='cd' style='--a:#ff5ea0;--b:#7b2ff7'><div class='ic'>▶️</div><h3>SaaS</h3><p>Software-as-a-service. 드래그앤드롭 UI. Copilot Studio, 즉시 에이전트 런타임.</p></div></div>", "points": [], "note": "에이전트를 만드는 방식은 세 갈래입니다. IaaS는 GPU·컨테이너까지 직접 다루며 자유도가 최고, PaaS는 Foundry Agent Service로 관리형 편의를, SaaS는 Copilot Studio로 드래그앤드롭만으로 만듭니다. 왼쪽으로 갈수록 통제·가시성, 오른쪽으로 갈수록 속도·편의가 커집니다. 팀 역량과 목적에 맞춰 골라 쓰면 됩니다.", "imgs": [], "videos": []}, {"n": 5, "title": "AI Development Fundamentals", "html": "<p class='lead'>Foundry 허브를 6개 기본 요소가 둘러싼 라이프사이클.</p><div class='gr gr3'><div class='cd'><div class='ic'>🧩</div><h3>Models</h3></div><div class='cd'><div class='ic'>🧠</div><h3>Knowledge & tools</h3></div><div class='cd'><div class='ic'>🛠️</div><h3>Orchestration & Dev Tools</h3></div><div class='cd'><div class='ic'>👁️</div><h3>Observability & agent controls</h3></div><div class='cd'><div class='ic'>🎚️</div><h3>Fine-tuning & customization</h3></div><div class='cd'><div class='ic'>🚀</div><h3>Deployment</h3></div></div>", "points": [], "note": "AI 개발의 기본기는 여섯 가지입니다. 모델, 지식·도구, 오케스트레이션·개발도구, 관측·에이전트 제어, 미세조정·커스터마이징, 배포. 이 여섯이 Foundry라는 허브를 원형으로 둘러싸며 하나의 라이프사이클을 만듭니다. 따로 쓰던 도구를 Foundry가 전체로 묶어준다는 점이 핵심입니다.", "imgs": [], "videos": []}, {"n": 6, "title": "Build → Optimize → Operate", "html": "<pre class='mermaid'>flowchart LR\nA[Build]-->B[Optimize]-->C[Operate]-->A\n</pre><div class='gr gr3' style='margin-top:6px'><div class='cd'><h3>Build</h3><p>Use Case 식별 → 모델·도구 리서치 → 빌드 → 미세조정 → Multi-Agent 오케스트레이션</p></div><div class='cd'><h3>Optimize</h3><p>코드 커스터마이징 → 런타임 호스팅 → 동작 평가 → 배포</p></div><div class='cd' style='--a:#ff8a00;--b:#ff5ea0'><h3>Operate</h3><p>비용·규제·안정성 모니터링 → 위험 완화 → 통합</p></div></div><p style='margin-top:12px;color:#9fb0d0'>각 단계는 '잘 동작하나요?'로 검증, 아니면 이전 단계로 되돌아가는 반복 루프.</p>", "points": [], "note": "에이전트 라이프사이클은 Build·Optimize·Operate 세 단계입니다. Build에서 유스케이스 식별부터 멀티에이전트 오케스트레이션까지, Optimize에서 호스팅·평가·배포, Operate에서 모니터링·보호·통합을 합니다. 각 단계 끝에 '잘 동작하나요?'로 검증하고 아니면 되돌아가는 반복 구조입니다. 한 번에 끝나는 게 아니라 계속 개선하는 사이클이라는 점이 중요합니다.", "imgs": [], "videos": []}, {"n": 7, "title": "2. Foundry가 제공하는 서비스들", "divider": true, "points": [], "note": "두 번째 파트입니다. 이제 Foundry가 실제로 제공하는 서비스들을 모델, 라우터, 오케스트레이션, 배포, 평가 순으로 구체적으로 살펴봅니다.", "imgs": [], "videos": []}, {"n": 8, "title": "Every model. Every use case. One platform.", "html": "<p class='lead'>11,000+ 프런티어·오픈 모델을 Foundry Models 한곳에서.</p><div class='gr gr2'><div class='cd'><h3>Benefits — All Foundry Models</h3><p>통합된 접근 · Scalable deployment · Enterprise-Ready</p><h3 style='margin-top:10px'>Sold directly by Microsoft</h3><p>SLA·compliance · Reserved capacity · 비용 최적화 PTU · Safety guardrails(Default)</p></div><div class='cd'><h3>Model families</h3><p>Azure OpenAI · DeepSeek · xAI Grok · Mistral · Meta Llama · Black Forest Labs · Cohere · Databricks · Hugging Face · NVIDIA · Stability · NTT Data · Core42 Jais · SDAIA ALLaM</p><p>Industry: Sight Machine · Rockwell · Bayer · Saifr · Paige · Cerence</p></div></div>", "points": [], "note": "Foundry Models에는 1만 1천 개 이상의 프런티어·오픈 모델이 있습니다. Azure OpenAI, DeepSeek, Grok, Mistral, Meta Llama, NVIDIA, Cohere 등 주요 패밀리를 한 플랫폼에서 씁니다. 마이크로소프트가 직판하는 모델은 SLA·컴플라이언스, 예약 용량, PTU 비용 최적화, 기본 안전 가드레일까지 보장합니다. 산업 특화 모델도 있어 사실상 모든 유스케이스를 커버합니다.", "imgs": [], "videos": []}, {"n": 9, "title": "모델 라우터", "html": "<div class='gr gr2' style='align-items:center'><svg viewBox='0 0 200 200' style='width:100%;max-height:34vh'><circle cx='100' cy='100' r='80' fill='none' stroke='#1c2540' stroke-width='22'/><circle cx='100' cy='100' r='80' fill='none' stroke='url(#h)' stroke-width='22' stroke-dasharray='301 502' stroke-linecap='round' transform='rotate(-90 100 100)'/><text x='100' y='95' fill='#fff' font-size='40' font-weight='800' text-anchor='middle'>60%</text><text x='100' y='120' fill='#9fb0d0' font-size='13' text-anchor='middle'>비용 절감</text></svg><div class='gr gr2'><div class='cd'><h3>Select Foundry models</h3><p>작업 복잡성·품질 기준 최적 모델 선택</p></div><div class='cd'><h3>New routing profiles</h3><p>라우팅 프로필·모델 하위집합 정의</p></div><div class='cd'><h3>Enterprise reliability</h3><p>Azure 내장 보안·Observability</p></div><div class='cd'><h3>Agent Service</h3><p>지능형 라우팅으로 에이전트 최적화</p></div></div></div>", "points": [], "note": "모델 라우터는 주요 모델에 대한 지능형 프롬프트 라우팅입니다. 작업 복잡성과 요구 품질을 기준으로 최적 모델을 자동 선택하고, 라우팅 프로필과 모델 하위집합을 정의할 수 있습니다. Azure급 보안·Observability를 갖췄고 Agent Service에도 내장됐습니다. GPT-4.1 단독 대비 비슷한 정확도로 최대 60% 비용을 절감했습니다.", "imgs": [], "videos": []}, {"n": 10, "title": "모델 라우터 동작 구조", "html": "<div class='gr gr2'><div class='cd'><h3>Challenge</h3><p>적합한 LLM 선택은 어렵고, 단일 LLM에 고집하기 쉽다.</p></div><div class='cd' style='--a:#a6ed5d;--b:#22d3ee'><h3>Opportunity</h3><p>스마트 라우팅은 품질 유지+비용 최적화. UX 저하 없이 절감.</p></div></div><pre class='mermaid' style='margin-top:8px'>flowchart LR\nI[입력 질문/쿼리]-->R{모델 라우터}\nR-->N[GPT-4.1-nano]\nR-->M[GPT-4.1-mini]\nR-->O[출력 Response]\nN-->O\nM-->O\n</pre>", "points": [], "note": "동작 구조는 3단계입니다. 사용자가 간단한 질문이든 복잡한 일정 계획이든 API로 호출하면, 라우터가 입력 매개변수를 평가해 GPT-4.1-nano·mini 등으로 동적 라우팅합니다. 쉬운 건 작은 모델, 어려운 건 큰 모델로 보내 비용과 품질을 동시에 잡습니다. 단일 LLM 고집의 한계를 스마트 라우팅으로 푸는 게 핵심입니다.", "imgs": [], "videos": []}, {"n": 11, "title": "Agent Orchestration", "html": "<p class='lead'>계획·추론·실행을 데이터·도구 전반에서 매끄럽게.</p><div class='gr gr2'><div class='cd'><h3>설정 패널</h3><p>① 모델 선택 ② 프롬프트 작성 ③ 도구 연결 ④ 지식 연결 ⑤ 메모리 연결 ⑥ 가드레일 연결</p></div><div class='cd' style='--a:#7b2ff7;--b:#ff5ea0'><h3>Playground 테스트</h3><p>Playground·Traces·Monitor·Evaluation 탭에서 바로 채팅 검증</p></div></div>", "points": [], "note": "Agent Orchestration은 멀티에이전트 워크플로우를 구성하는 화면입니다. 왼쪽 설정 패널에서 모델 선택, 프롬프트 작성, 도구·지식·메모리·가드레일 연결을 차례로 합니다. 오른쪽 채팅 테스트 창에서 Playground, Traces, Monitor, Evaluation으로 즉시 검증합니다. 만들고 바로 실험하는 루프를 한 화면에서 끝낼 수 있습니다.", "imgs": [], "videos": []}, {"n": 12, "title": "Hosted Agent", "html": "<p class='lead'>커스텀 코드 에이전트를 컨테이너로 묶어 Agent Service에 호스팅.</p><div class='flow'><div class='cd'><h3>Client</h3><p>Agent frameworks → Build/Package → Containers → Deploy</p></div><div class='cd' style='--a:#a6ed5d;--b:#22d3ee'><h3>Foundry Agent Service</h3><p>버전 v1, type hosted, Status Running, event-planner-workflow</p></div></div>", "points": [], "note": "Hosted Agent은 어떤 프레임워크로 만든 코드 에이전트든 컨테이너로 묶어 Foundry Agent Service에 호스팅하는 방식입니다. Build/Package→Containers→Deploy 흐름으로 클라이언트 에이전트를 그대로 올립니다. 콘솔에서 버전·타입·상태(Running)·ID를 바로 확인합니다. 프레임워크 자유를 유지하면서 운영은 관리형으로 맡길 수 있습니다.", "imgs": [], "videos": []}, {"n": 13, "title": "One-click publishing", "html": "<p class='lead'>Foundry로 만든 에이전트를 M365 Copilot·Teams에 즉시 게시.</p><pre class='mermaid'>flowchart LR\nA[Foundry Agent Service]-->B[원클릭 Publish]-->C[M365 · Teams]\n</pre><p style='margin-top:8px;color:#9fb0d0'>Published v6 · Publish updates로 바로 갱신</p>", "points": [], "note": "원클릭 퍼블리싱은 Foundry 에이전트를 M365 Copilot과 Teams에 즉시 배포합니다. Publish 버튼 하나로 게시되고, Publish updates로 새 버전을 바로 갱신합니다. 한 번 만든 에이전트를 사용자들이 익숙한 Teams에서 곧장 쓸 수 있습니다. 빌드와 전달 사이의 간극을 없앤 게 강점입니다.", "imgs": [], "videos": []}, {"n": 14, "title": "\"엣지 라우터에서 CTL11 LED는 무엇을 하나요?\"", "divider": true, "points": [], "note": "현장에서 흔한 질문 하나로 시연을 열겠습니다. 'P4324 장비가 안 켜지고 CTL11 경고등이 빨간불, UL 817 라벨은 무슨 뜻?' — 답하려면 매뉴얼·표준·회사 정책 등 여러 지식이 필요합니다.", "imgs": [], "videos": []}, {"n": 15, "title": "현장 질의 — 멀티소스 지식이 필요한 순간", "html": "<div class='gr gr2'><div class='cd'><h3>질문</h3><p>P4324 장비 미동작, CTL11 빨간 경고등, 전원공급 문제? UL 817 라벨, 부품 교체 가능?</p></div><div class='cd'><h3>필요한 지식 소스</h3><p>장비 매뉴얼(Fabric OneLake) · 사용자 오타 보정 · 전기 표준(웹) · 회사 방침(SharePoint)</p></div></div>", "points": [], "note": "이 한 문장에 답하려면 네 가지 소스가 동시에 필요합니다. 장비 매뉴얼은 Fabric OneLake, 전기 표준 UL 817은 공개 웹, 회사 방침은 SharePoint, 게다가 사용자 오타까지 보정해야 합니다. 단일 문서로는 못 풉니다. 그래서 멀티소스 지식 베이스가 필요합니다.", "imgs": [], "videos": []}, {"n": 16, "title": "Multi-Source AI Knowledge Bases", "html": "<div class='gr gr3'><div class='cd'><h3>Query planning</h3><p>질문을 분해해 소스별로 분기</p></div><div class='cd'><h3>3 routes</h3><p>① CRM 사용자·차량 ② SharePoint 내부 문서 ③ 웹 충전망 뉴스</p></div><div class='cd' style='--a:#7b2ff7;--b:#22d3ee'><h3>SLM → Foundry IQ</h3><p>결과 통합·요약</p></div></div>", "points": [], "note": "Foundry IQ는 여러 지식 소스를 하나의 답으로 묶습니다. Query planning이 질문을 분해해 CRM·SharePoint·웹으로 분기하고, 각 소스를 조회한 뒤 SLM이 종합합니다. CRM, SharePoint, 공개 웹 어디든 끌어와 한 번에 답합니다. 앞 슬라이드의 현장 질문도 이렇게 한 답으로 해결됩니다.", "imgs": [], "videos": []}, {"n": 17, "title": "MCP-enabled tools in Microsoft Foundry", "html": "<p class='lead'>1,404개 도구를 순차 연결해 작업 수행.</p><div class='gr gr3'><div class='cd'><h3>Configured</h3></div><div class='cd' style='--a:#7b2ff7;--b:#ff5ea0'><h3>Catalog</h3></div><div class='cd' style='--a:#22d3ee;--b:#3bb78f'><h3>Custom</h3></div></div><div style='margin-top:10px'><span class='pill'>Cosmos DB</span><span class='pill'>GitHub</span><span class='pill'>Hugging Face</span><span class='pill'>SQL</span><span class='pill'>Elastic</span><span class='pill'>Azure Speech</span></div>", "points": [], "note": "Foundry 도구 카탈로그에는 1,404개 MCP 도구가 있고 Configured·Catalog·Custom 세 분류입니다. Cosmos DB, GitHub, Hugging Face, SQL, Elastic 등 원격·로컬 MCP를 골라 붙입니다. 에이전트는 이 도구들을 순차로 연결해 작업을 수행합니다. 사실상 어떤 시스템이든 도구로 끌어올 수 있습니다.", "imgs": [], "videos": []}, {"n": 18, "title": "Fine-tuning", "html": "<p class='lead'>특정 사용 사례에 맞춘 성능·정확도 향상.</p><div class='gr gr3'><div class='cd'><div class='ic'>🎯</div><h3>정확도↑</h3><p>유스케이스 맞춤 성능</p></div><div class='cd'><div class='ic'>💸</div><h3>비용↓·지연↓</h3><p>효율 극대화</p></div><div class='cd'><div class='ic'>🛡️</div><h3>환각 방지</h3><p>편향·hallucination 감소</p></div></div>", "points": [], "note": "Fine-tuning은 모델을 특정 유스케이스에 맞춰 성능과 정확도를 끌어올립니다. 비용 절감과 효율 극대화, 지연 최소화 효과가 있고 편향과 환각도 줄입니다. 콘솔에서 DeepSeek·OpenAI·Microsoft 기반 모델로 진행 상황·정확도를 추적합니다. 베이스 모델로 부족할 때 가장 확실한 커스터마이징 수단입니다.", "imgs": [], "videos": []}, {"n": 19, "title": "Foundry Control Plane", "html": "<p class='lead'>조직 전반 가시성·제어로 AI 라이프사이클 관리.</p><div class='gr gr3'><div class='cd'><h3>운영 가시성</h3><p>토큰·지연·런 모니터</p></div><div class='cd'><h3>보안 강화</h3><p>레드팀·민감정보 누출 점검</p></div><div class='cd' style='--a:#ff8a00;--b:#ff5ea0'><h3>전사 운영</h3><p>평가·일정평가·에러율</p></div></div>", "points": [], "note": "Foundry Control Plane은 조직 전체의 가시성과 제어로 AI 라이프사이클을 관리합니다. 토큰 사용·지연·에이전트 런, 요청·토큰 추이, 에러율을 대시보드로 봅니다. 레드팀 공격 성공률, 민감정보 누출 같은 보안 지표도 함께 추적합니다. 운영 가시성·보안·전사 관리를 한곳에서 잡습니다.", "imgs": [], "videos": []}, {"n": 20, "title": "Evaluators", "html": "<div class='gr gr3'><div class='cd'><h3>Quality</h3><p>Document Retrieval · Groundedness · Relevance · Coherence · Fluency · Similarity · NLP Metrics(F1) · AOAI Graders</p></div><div class='cd'><h3>Risk & Safety</h3><p>Jailbreaks · Hate · Sexual · Violence · Self-Harm · Protected Material · Ungrounded · Code Vuln · Prohibited · Data Leakage</p></div><div class='cd' style='--a:#7b2ff7;--b:#22d3ee'><h3>Agents <span class=tag>NEW</span></h3><p>Intent Resolution · Tool Call/Selection/Input/Output · Task Adherence · Completeness · Success · Navigation</p></div></div><p style='margin-top:8px'><span class='pill'>+ Custom Evaluators</span></p>", "points": [], "note": "평가는 Quality·Risk&Safety·Agents 세 축입니다. Quality는 검색·근거성·관련성·일관성, Risk&Safety는 탈옥·증오·폭력·데이터 누출, Agents는 의도 해석·도구 정확도·과제 완료를 봅니다. 다수가 신규 Public Preview이고 Custom Evaluator도 추가할 수 있습니다. 만든 에이전트를 정량적으로 검증하는 핵심 장치입니다.", "imgs": [], "videos": []}, {"n": 21, "title": "Agent 평가 예시 — 일기예보 제공", "html": "<pre class='mermaid'>flowchart LR\nU[User Intent]-->T[도구 호출]-->Rsp[응답]\n</pre><div class='gr gr3' style='margin-top:6px'><div class='cd'><h3>User Intent</h3><p>지역·시간 의도 분석 → 의도 해석 평가</p></div><div class='cd'><h3>도구 호출</h3><p>get_loc()·get_weather() → 선택·입출력 정확도</p></div><div class='cd' style='--a:#a6ed5d;--b:#22d3ee'><h3>응답</h3><p>완료율·Groundedness·Relevance·정책 준수</p></div></div>", "points": [], "note": "날씨 질문을 예로 평가가 어떻게 돌아가는지 봅니다. 1단계 의도 해석, 2단계 get_loc·get_weather 도구 호출, 3단계 응답 생성을 각각 평가합니다. 도구 선택·입력·출력 정확도, 과제 완료율, Groundedness까지 단계별로 점수화합니다. Ignite 신규 기능으로 에이전트 품질을 정밀하게 측정할 수 있습니다.", "imgs": [], "videos": []}, {"n": 22, "title": "Model Customization Options", "html": "<div class='gr gr2'><div class='cd'><h3>01 Base model</h3><p>Foundry Models</p></div><div class='cd'><h3>02 Prompt·Declarative</h3><p>Agent Service</p></div><div class='cd'><h3>03 RAG·Multi-agents</h3><p>Foundry IQ · Agent Service</p></div><div class='cd'><h3>04 Feedback signals</h3><p>Control Plane</p></div><div class='cd'><h3>05 Fine-tuning/RAFT</h3><p>Distillation in Foundry</p></div><div class='cd' style='--a:#a6ed5d;--b:#22d3ee'><h3>06 Continuous loop</h3><p>개선 신호 루프</p></div></div>", "points": [], "note": "마지막으로 커스터마이징 단계입니다. 베이스 모델부터 프롬프트·선언형, RAG·멀티에이전트, 피드백 신호, 파인튜닝/RAFT, 지속 개선 루프까지 6단계입니다. 오른쪽 위로 갈수록 적응 성숙도와 비즈니스 가치가 커집니다. 시작은 베이스 모델, 끝은 자동 개선 루프 — 단계적으로 올라가면 됩니다.", "imgs": [], "videos": []}, {"n": 23, "title": "감사합니다", "divider": true, "points": [], "note": "오늘 발표는 여기까지입니다. Foundry는 모델·도구·데이터를 넣으면 에이전트가 나오는 공장이라는 점, 빌드부터 운영까지 한 플랫폼으로 끝난다는 점 기억해주세요. 감사합니다.", "imgs": [], "videos": []}, {"n": 24, "title": "최신 업데이트", "html": "<div class=\"s\" style=\"left:6%;top:18%;width:88%;height:64%;\"><p style=\"font-size:6cqh;\">🆕 최신 업데이트</p><p style=\"font-size:3cqh;\">출처: https://raw.githubusercontent.com/MicrosoftDocs/azure-ai-docs/main/articles/foundry/whats-new-foundry.md</p><p style=\"font-size:2.6cqh;\">수집일 2026-06-29</p></div>", "points": [], "note": "", "imgs": [], "videos": []}, {"n": 25, "title": "업데이트 · Azure OpenAI", "html": "<div class=\"s\" style=\"left:6%;top:10%;width:88%;height:82%;\"><p style=\"font-size:4.4cqh;color:#22d3ee;\">Azure OpenAI</p><p style=\"font-size:2.9cqh;\">• Quickstart: Create a provisioned throughput deployment</p><p style=\"font-size:2.9cqh;\">• Determine provisioned throughput unit (PTU) sizing for a workload</p><p style=\"font-size:2.9cqh;\">• Auto and direct model routing with the Responses API</p><p style=\"font-size:2.9cqh;\">• Use model router with Foundry agents</p><p style=\"font-size:2.9cqh;\">• Automate Azure OpenAI deployments with quota</p><p style=\"font-size:2.9cqh;\">• Get started with Azure OpenAI audio generation</p></div>", "points": [], "note": "", "imgs": [], "videos": []}, {"n": 26, "title": "업데이트 · Foundry Agent Service", "html": "<div class=\"s\" style=\"left:6%;top:10%;width:88%;height:82%;\"><p style=\"font-size:4.4cqh;color:#22d3ee;\">Foundry Agent Service</p><p style=\"font-size:2.9cqh;\">• Enable incoming A2A on a Foundry agent (preview)</p><p style=\"font-size:2.9cqh;\">• Routines in Microsoft Foundry (preview)</p><p style=\"font-size:2.9cqh;\">• Automate agents with routines (preview)</p><p style
